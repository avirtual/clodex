{{- /* Chart-managed token Secret — rendered only when a wireToken value was
passed at install time (--set-file secrets.wireToken=FILE; see values.yaml
for the two modes). trim kills the trailing newline a token file usually
carries — the bearer-corruption trap the operator-managed path documents.
stringData (not data) so helm/k8s handle the encoding. */ -}}
{{- if .Values.secrets.wireToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels: {{- include "clodex.labels" . | nindent 4 }}
type: Opaque
stringData:
  wire-token: {{ .Values.secrets.wireToken | trim | quote }}
  {{- with .Values.secrets.oauthToken }}
  oauth-token: {{ . | trim | quote }}
  {{- end }}
{{- end }}

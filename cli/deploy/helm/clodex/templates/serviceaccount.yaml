{{- if .Values.serviceAccount.create }}
# The pod's cloud identity. On EKS, the role-arn annotation (IRSA) binds
# this service account to an IAM role — the k8s analog of the Fargate task
# role, but per POD: more releases = more identities on one cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clodex.serviceAccountName" . }}
  labels: {{- include "clodex.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
